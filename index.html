<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Dani's - Comidas Rápidas Valledupar</title>
    <meta name="description" content="El Dani's Valledupar. Hamburguesas, pizzas, salchipapas, hot dogs y patacones. Domicilios Mz 15 casa 46 Mareigua.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #f5f5f5;
        }
        header {
            background: linear-gradient(135deg, #ff6b00, #ffc107);
            padding: 30px 20px;
            text-align: center;
        }
        header h1 {
            font-size: 2.8rem;
            color: #000;
            font-weight: 900;
        }
        .logo-sub {
            color: #1a1a1a;
            font-size: 1.2rem;
            margin-top: 5px;
            font-weight: 600;
        }
        .info-bar {
            background: #1a1a1a;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #ffc107;
        }
        .info-bar a {
            color: #25D366;
            text-decoration: none;
            font-weight: bold;
            margin: 0 15px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .categoria {
            margin-bottom: 50px;
        }
        .categoria h2 {
            color: #ffc107;
            font-size: 2rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #ff6b00;
        }
        .productos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .item {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-info h3 {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
        .item-info p {
            color: #aaa;
            font-size: 0.85rem;
        }
        .precio {
            color: #4caf50;
            font-size: 1.4rem;
            font-weight: bold;
            white-space: nowrap;
        }
        .btn-wsp {
            display: block;
            background: #25D366;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            text-align: center;
            margin: 30px auto;
            max-width: 300px;
            font-size: 1.1rem;
        }
        .btn-wsp:hover { background: #1ebe5d; }
        .galeria-fotos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin: 40px 0;
        }
        .galeria-fotos img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
        }
        .pagos {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            margin-top: 40px;
        }
        .pagos h3 {
            color: #ffc107;
            margin-bottom: 15px;
        }
        footer {
            text-align: center;
            padding: 30px 20px;
            color: #666;
            background: #000;
        }
    </style>
</head>
<body>
    <header>
        <h1>EL DANI'S</h1>
        <div class="logo-sub">El sabor que buscas - Valledupar</div>
    </header>

    <div class="info-bar">
        <a href="https://wa.me/573216080520?text=Hola%20El%20Dani's,%20quiero%20hacer%20un%20pedido" target="_blank">📱 321 608 0520</a>
        <a href="https://maps.google.com/?q=Mz+15+casa+46+Mareigua+Valledupar" target="_blank">📍 Mz 15 casa 46 - Mareigua</a>
    </div>

    <div class="container">
        <div class="galeria-fotos">
            <img src="burguer.jpg" alt="Hamburguesa El Dani's">
            <img src="pizza.jpg" alt="Pizza El Dani's">
            <img src="salchipapa.jpg" alt="Salchipapa El Dani's">
            <img src="perro.jpg" alt="Hot Dog El Dani's">
        </div>
